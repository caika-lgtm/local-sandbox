name: Release Node.js Binding

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish in dry-run mode"
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBUG: napi:*
  COREPACK_INTEGRITY_KEYS: 0
  MACOSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: bindings/nodejs/yarn.lock
      - run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cmake --version
      - run: yarn install --immutable
      - run: yarn napi build --target ${{ matrix.target }} --platform --release --js index.js --dts index.d.ts
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-nodejs-${{ matrix.target }}
          path: |
            bindings/nodejs/lsb-nodejs.*.node
            bindings/nodejs/index.js
            bindings/nodejs/index.d.ts
          if-no-files-found: error

  publish:
    name: Publish npm Packages
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: yarn
          cache-dependency-path: bindings/nodejs/yarn.lock
      - run: corepack enable
      - run: yarn install --immutable

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/nodejs/artifacts

      - name: Move artifacts
        run: yarn artifacts

      - name: Restore generated entrypoint
        shell: bash
        run: |
          entrypoint_js="$(find artifacts -type f -name index.js -print -quit)"
          if [[ -z "$entrypoint_js" ]]; then
            echo "index.js was not found in downloaded build artifacts" >&2
            exit 1
          fi

          entrypoint_dir="$(dirname "$entrypoint_js")"
          cp "$entrypoint_dir/index.js" ./index.js
          cp "$entrypoint_dir/index.d.ts" ./index.d.ts

      - name: Validate versions
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"

          if [[ "$package_version" != "$cargo_version" ]]; then
            echo "package.json version ($package_version) does not match Cargo.toml version ($cargo_version)" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$package_version" ]]; then
              echo "tag version ($tag_version) does not match package version ($package_version)" >&2
              exit 1
            fi
          fi

      - name: List generated npm packages
        run: ls -R ./npm
        shell: bash

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish dry run
        if: (github.event_name == 'workflow_dispatch' && inputs.dry_run) || (startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-'))
        shell: bash
        run: |
          yarn napi prepublish -t npm --no-gh-release --skip-optional-publish
          npm publish --access public --dry-run --ignore-scripts

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
        run: npm publish --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
