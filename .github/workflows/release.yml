name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-os-image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: ubuntu-24.04-arm
            guest_linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
          - platform: macos-x86_64
            runner: ubuntu-24.04
            guest_linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform "${{ matrix.platform }}" --format env --version "${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Add guest target
        run: rustup target add "${LSB_GUEST_TARGET}"

      - name: Install musl toolchain and kernel build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential bc flex bison \
            libelf-dev libssl-dev wget xz-utils

      - name: Build lsb-guest
        run: env "${{ matrix.guest_linker_env }}=${{ matrix.guest_linker_bin }}" cargo build -p lsb-guest --target "${LSB_GUEST_TARGET}" --release

      - name: Build OS image
        run: cargo run -p xtask -- prepare-rootfs --platform "${{ matrix.platform }}"

      - name: Package OS image
        run: cargo run -p xtask -- package-release --platform "${{ matrix.platform }}" --artifact os-image --version "${GITHUB_REF_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.platform }}
          path: lsb-os-*.tar.gz
          retention-days: 1

  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-14
          - platform: macos-x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform "${{ matrix.platform }}" --format env --version "${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Build CLI
        run: cargo build -p lsb-cli --release

      - name: Codesign
        run: codesign --entitlements "${LSB_CODESIGN_ENTITLEMENTS}" --force -s - target/release/lsb

      - name: Package CLI binary
        run: cargo run -p xtask -- package-release --platform "${{ matrix.platform }}" --artifact cli --version "${GITHUB_REF_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binary-${{ matrix.platform }}
          path: lsb-*.tar.gz
          retention-days: 1

  release:
    needs: [build-os-image, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          merge-multiple: true
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-binary-*
          merge-multiple: true
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
