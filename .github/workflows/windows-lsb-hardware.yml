name: windows-lsb-hardware

on:
  workflow_dispatch:
    inputs:
      test_set:
        description: "Which Windows test set to run"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - unit
          - smoke
          - e2e

permissions:
  contents: read

env:
  # Stores download crates globally across all workflow runs
  CARGO_HOME: "C:\\cargo_cache"
  # Isolates build artifacts per repository to avoid concurrent write locks
  CARGO_TARGET_DIR: "C:\\target_cache\\${{ github.repository }}"
  RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

concurrency:
  group: windows-lsb-hardware
  cancel-in-progress: false

jobs:
  windows:
    name: Windows native LSB tests
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: false
          fetch-depth: 1

      - name: Configure PATH
        run: |
          $nativeToolDirs = @(
            "$env:USERPROFILE\.cargo\bin",
            "C:\Program Files\CMake\bin",
            "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin",
            "C:\Program Files\NASM",
            "C:\Program Files\LLVM\bin",
            "C:\Program Files\qemu"
          )

          foreach ($dir in $nativeToolDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            } else {
              Write-Warning "Native tool directory does not exist: $dir"
            }
          }

          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show environment
        run: |
          hostname
          whoami
          pwd

          git --version
          rustc --version
          cargo --version
          rustup show

          where.exe cmake
          cmake --version

          where.exe nasm
          nasm -v

          where.exe clang
          clang --version

          where.exe libclang.dll
          Write-Host "LIBCLANG_PATH=$env:LIBCLANG_PATH"

          qemu-system-x86_64 --version
          node --version
          npm --version

      - name: Cargo check
        if: ${{ inputs.test_set == 'check' }}
        run: |
          cargo check --workspace --locked

      - name: Cargo unit tests
        if: ${{ inputs.test_set == 'unit' }}
        run: |
          cargo test --workspace --locked

      - name: Windows smoke tests
        if: ${{ inputs.test_set == 'smoke' }}
        run: |
          cargo test --workspace --locked

          if (Test-Path .\tools\windows-smoke.ps1) {
            .\tools\windows-smoke.ps1
          } else {
            Write-Warning "tools/windows-smoke.ps1 does not exist yet; running compile/unit layer only."
          }

      - name: Windows e2e tests
        if: ${{ inputs.test_set == 'e2e' }}
        run: |
          cargo test --workspace --locked

          if (Test-Path .\tools\windows-e2e.ps1) {
            .\tools\windows-e2e.ps1
          } else {
            Write-Warning "tools/windows-e2e.ps1 does not exist yet; running compile/unit layer only."
          }

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-lsb-diagnostics
          path: |
            target/**/*.log
            crates/**/target/**/*.log
            C:\actions-runner\_diag\*.log
          if-no-files-found: ignore
