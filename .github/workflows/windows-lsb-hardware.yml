name: windows-lsb-hardware

on:
  workflow_dispatch:
    inputs:
      test_set:
        description: "Which Windows test set to run"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - unit
          - smoke
          - e2e

permissions:
  contents: read

concurrency:
  group: windows-lsb-hardware
  cancel-in-progress: false

jobs:
  windows-boot-cache-probe:
    name: Probe Windows boot asset cache
    if: ${{ inputs.test_set == 'smoke' || inputs.test_set == 'e2e' }}
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 30

    outputs:
      asset_key: ${{ steps.boot-assets.outputs.asset_key }}
      cache_hit: ${{ steps.boot-assets.outputs.cache_hit }}

    env:
      # Stores downloaded crates globally across all workflow runs.
      CARGO_HOME: "C:\\cargo_cache"
      # Isolates build artifacts per repository to avoid concurrent write locks.
      CARGO_TARGET_DIR: "C:\\target_cache\\${{ github.repository }}"
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: false
          fetch-depth: 1

      - name: Configure PATH
        run: |
          $nativeToolDirs = @(
            "$env:USERPROFILE\.cargo\bin",
            "C:\Program Files\CMake\bin",
            "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin",
            "C:\Program Files\NASM",
            "C:\Program Files\LLVM\bin"
          )

          foreach ($dir in $nativeToolDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            } else {
              Write-Warning "Native tool directory does not exist: $dir"
            }
          }

          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve and probe boot asset cache
        id: boot-assets
        run: |
          $assetKey = (cargo run --quiet -p xtask -- boot-asset-key --platform windows-x86_64).Trim()
          if (-not $assetKey) {
            throw "Failed to resolve Windows boot asset key."
          }

          $cacheHit = "false"
          try {
            .\scripts\prepare-windows-boot-assets.ps1 -AssetKey $assetKey -UseCachedOnly -ProbeOnly
            $cacheHit = "true"
          } catch {
            Write-Host "Boot asset cache miss for $assetKey. $($_.Exception.Message)"
          }

          "asset_key=$assetKey" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "cache_hit=$cacheHit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Boot asset key: $assetKey"
          Write-Host "Boot asset cache hit: $cacheHit"

  prepare-boot-assets:
    name: Prepare Windows boot assets
    if: ${{ (inputs.test_set == 'smoke' || inputs.test_set == 'e2e') && needs.windows-boot-cache-probe.outputs.cache_hit != 'true' }}
    needs: windows-boot-cache-probe
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    env:
      BOOT_ASSET_PLATFORM: windows-x86_64
      BOOT_ASSET_KEY: ${{ needs.windows-boot-cache-probe.outputs.asset_key }}
      BOOT_ASSET_DIR: target/windows-boot-assets/windows-x86_64
      KERNEL_ASSET_DIR: target/windows-kernel-assets/windows-x86_64
      LSB_DATA_DIR: /tmp/lsb-windows-boot-assets
      LSB_FORCE_DOCKER_ROOTFS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Restore staged boot asset cache
        id: boot-assets-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOT_ASSET_DIR }}
          key: ${{ env.BOOT_ASSET_KEY }}

      - name: Restore kernel image cache
        id: kernel-image-cache
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.KERNEL_ASSET_DIR }}
          key: windows-kernel-image-v1-${{ env.BOOT_ASSET_PLATFORM }}-${{ hashFiles('kernel/lsb_x86_64_defconfig', 'xtask/src/kernel.rs', 'xtask/src/context.rs', 'crates/lsb-platform/src/windows_x86_64/mod.rs') }}

      - name: Install Rust toolchain
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        run: cargo run -p xtask -- platform-meta --platform "${BOOT_ASSET_PLATFORM}" --format env >> "$GITHUB_ENV"

      - name: Add guest target
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        run: |
          test "${LSB_GUEST_TARGET}" = "x86_64-unknown-linux-musl"
          rustup target add "${LSB_GUEST_TARGET}"

      - name: Install guest build tools
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential musl-tools

      - name: Build lsb-guest
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        run: cargo build -p lsb-guest --target "${LSB_GUEST_TARGET}" --release

      - name: Prepare rootfs assets
        if: ${{ steps.boot-assets-cache.outputs.cache-hit != 'true' }}
        run: |
          rm -rf "${LSB_DATA_DIR}" "${BOOT_ASSET_DIR}"
          mkdir -p "${LSB_DATA_DIR}" "${BOOT_ASSET_DIR}" "${KERNEL_ASSET_DIR}"
          if [ "${{ steps.kernel-image-cache.outputs.cache-hit }}" = "true" ]; then
            test -s "${KERNEL_ASSET_DIR}/Image"
            cp "${KERNEL_ASSET_DIR}/Image" "${LSB_DATA_DIR}/Image"
            echo "Restored cached kernel image to ${LSB_DATA_DIR}/Image"
          fi
          cargo run -p xtask -- prepare-rootfs --platform "${BOOT_ASSET_PLATFORM}"
          test -s "${LSB_DATA_DIR}/Image"
          cp "${LSB_DATA_DIR}/Image" "${KERNEL_ASSET_DIR}/Image"

      - name: Stage boot assets and manifest
        run: |
          set -euo pipefail
          mkdir -p "${BOOT_ASSET_DIR}"

          if [ "${{ steps.boot-assets-cache.outputs.cache-hit }}" != "true" ]; then
            for asset in Image initramfs.cpio.gz rootfs.ext4; do
              test -s "${LSB_DATA_DIR}/${asset}"
              cp "${LSB_DATA_DIR}/${asset}" "${BOOT_ASSET_DIR}/${asset}"
            done
          else
            for asset in Image initramfs.cpio.gz rootfs.ext4; do
              test -s "${BOOT_ASSET_DIR}/${asset}"
            done
          fi

          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          image_sha="$(sha256sum "${BOOT_ASSET_DIR}/Image" | cut -d ' ' -f1)"
          initrd_sha="$(sha256sum "${BOOT_ASSET_DIR}/initramfs.cpio.gz" | cut -d ' ' -f1)"
          rootfs_sha="$(sha256sum "${BOOT_ASSET_DIR}/rootfs.ext4" | cut -d ' ' -f1)"
          image_size="$(stat -c%s "${BOOT_ASSET_DIR}/Image")"
          initrd_size="$(stat -c%s "${BOOT_ASSET_DIR}/initramfs.cpio.gz")"
          rootfs_size="$(stat -c%s "${BOOT_ASSET_DIR}/rootfs.ext4")"

          cat > "${BOOT_ASSET_DIR}/asset-manifest.json" <<EOF
          {
            "schema_version": 1,
            "asset_key": "${BOOT_ASSET_KEY}",
            "platform": "${BOOT_ASSET_PLATFORM}",
            "source_sha": "${GITHUB_SHA}",
            "generated_at": "${generated_at}",
            "files": [
              {
                "name": "Image",
                "sha256": "${image_sha}",
                "size_bytes": ${image_size}
              },
              {
                "name": "initramfs.cpio.gz",
                "sha256": "${initrd_sha}",
                "size_bytes": ${initrd_size}
              },
              {
                "name": "rootfs.ext4",
                "sha256": "${rootfs_sha}",
                "size_bytes": ${rootfs_size}
              }
            ]
          }
          EOF

          sha256sum "${BOOT_ASSET_DIR}/Image" "${BOOT_ASSET_DIR}/initramfs.cpio.gz" "${BOOT_ASSET_DIR}/rootfs.ext4"

      - name: Upload boot assets
        uses: actions/upload-artifact@v4
        with:
          name: windows-boot-assets
          path: |
            ${{ env.BOOT_ASSET_DIR }}/Image
            ${{ env.BOOT_ASSET_DIR }}/initramfs.cpio.gz
            ${{ env.BOOT_ASSET_DIR }}/rootfs.ext4
            ${{ env.BOOT_ASSET_DIR }}/asset-manifest.json
          retention-days: 1
          if-no-files-found: error

  windows-check-unit:
    name: Windows native check/unit
    if: ${{ inputs.test_set == 'check' || inputs.test_set == 'unit' }}
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    env:
      # Stores downloaded crates globally across all workflow runs.
      CARGO_HOME: "C:\\cargo_cache"
      # Isolates build artifacts per repository to avoid concurrent write locks.
      CARGO_TARGET_DIR: "C:\\target_cache\\${{ github.repository }}"
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: false
          fetch-depth: 1

      - name: Configure PATH
        run: |
          $nativeToolDirs = @(
            "$env:USERPROFILE\.cargo\bin",
            "C:\Program Files\CMake\bin",
            "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin",
            "C:\Program Files\NASM",
            "C:\Program Files\LLVM\bin",
            "C:\Program Files\qemu"
          )

          foreach ($dir in $nativeToolDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            } else {
              Write-Warning "Native tool directory does not exist: $dir"
            }
          }

          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show environment
        run: |
          hostname
          whoami
          pwd

          git --version
          rustc --version
          cargo --version
          rustup show

          where.exe cmake
          cmake --version

          where.exe nasm
          nasm -v

          where.exe clang
          clang --version

          where.exe libclang.dll
          Write-Host "LIBCLANG_PATH=$env:LIBCLANG_PATH"

          qemu-system-x86_64 --version
          node --version
          npm --version

      - name: Cargo check
        if: ${{ inputs.test_set == 'check' }}
        run: |
          cargo check --workspace --locked

      - name: Cargo unit tests
        if: ${{ inputs.test_set == 'unit' }}
        run: |
          cargo test --workspace --locked

      - name: Stage diagnostic logs
        if: always()
        run: |
          $stage = Join-Path $PWD "target\windows-lsb-diagnostics"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $runnerDiag = "C:\actions-runner\_diag"
          if (Test-Path -LiteralPath $runnerDiag) {
            $dest = Join-Path $stage "actions-runner"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Get-ChildItem -LiteralPath $runnerDiag -Filter "*.log" -File -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination $dest -Force
            }
          }

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-lsb-diagnostics
          path: |
            target/**/*.log
            crates/**/target/**/*.log
            target/windows-lsb-diagnostics/**
          if-no-files-found: ignore

  windows-smoke-e2e:
    name: Windows native smoke/e2e
    if: ${{ always() && (inputs.test_set == 'smoke' || inputs.test_set == 'e2e') && needs.windows-boot-cache-probe.result == 'success' && (needs.windows-boot-cache-probe.outputs.cache_hit == 'true' || needs.prepare-boot-assets.result == 'success') }}
    needs: [windows-boot-cache-probe, prepare-boot-assets]
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    env:
      # Stores downloaded crates globally across all workflow runs.
      CARGO_HOME: "C:\\cargo_cache"
      # Isolates build artifacts per repository to avoid concurrent write locks.
      CARGO_TARGET_DIR: "C:\\target_cache\\${{ github.repository }}"
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: false
          fetch-depth: 1

      - name: Configure PATH
        run: |
          $nativeToolDirs = @(
            "$env:USERPROFILE\.cargo\bin",
            "C:\Program Files\CMake\bin",
            "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin",
            "C:\Program Files\NASM",
            "C:\Program Files\LLVM\bin",
            "C:\Program Files\qemu"
          )

          foreach ($dir in $nativeToolDirs) {
            if (Test-Path $dir) {
              $dir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            } else {
              Write-Warning "Native tool directory does not exist: $dir"
            }
          }

          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Show environment
        run: |
          hostname
          whoami
          pwd

          git --version
          rustc --version
          cargo --version
          rustup show

          where.exe cmake
          cmake --version

          where.exe nasm
          nasm -v

          where.exe clang
          clang --version

          where.exe libclang.dll
          Write-Host "LIBCLANG_PATH=$env:LIBCLANG_PATH"

          qemu-system-x86_64 --version
          node --version
          npm --version

      - name: Prepare cached boot assets
        if: ${{ needs.windows-boot-cache-probe.outputs.cache_hit == 'true' }}
        run: |
          .\scripts\prepare-windows-boot-assets.ps1 -AssetKey "${{ needs.windows-boot-cache-probe.outputs.asset_key }}" -UseCachedOnly

      - name: Download boot assets
        if: ${{ needs.windows-boot-cache-probe.outputs.cache_hit != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: windows-boot-assets
          path: ${{ runner.temp }}\windows-boot-assets

      - name: Prepare local boot asset cache
        if: ${{ needs.windows-boot-cache-probe.outputs.cache_hit != 'true' }}
        run: |
          .\scripts\prepare-windows-boot-assets.ps1 -ArtifactDir "${{ runner.temp }}\windows-boot-assets"

      - name: Windows smoke tests
        if: ${{ inputs.test_set == 'smoke' }}
        run: |
          .\scripts\windows-smoke.ps1

      - name: Windows e2e tests
        if: ${{ inputs.test_set == 'e2e' }}
        run: |
          .\scripts\windows-e2e.ps1

      - name: Stage diagnostic logs
        if: always()
        run: |
          $stage = Join-Path $PWD "target\windows-lsb-diagnostics"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $assetWork = "C:\lsb-assets\work"
          if (Test-Path -LiteralPath $assetWork) {
            Get-ChildItem -LiteralPath $assetWork -Directory -ErrorAction SilentlyContinue | ForEach-Object {
              $diagnostics = Join-Path $_.FullName "diagnostics"
              if (Test-Path -LiteralPath $diagnostics) {
                $dest = Join-Path (Join-Path $stage "lsb-assets-work") $_.Name
                New-Item -ItemType Directory -Force -Path $dest | Out-Null
                Get-ChildItem -LiteralPath $diagnostics -Force -ErrorAction SilentlyContinue | ForEach-Object {
                  Copy-Item -LiteralPath $_.FullName -Destination $dest -Recurse -Force
                }
              }
            }
          }

          $runnerDiag = "C:\actions-runner\_diag"
          if (Test-Path -LiteralPath $runnerDiag) {
            $dest = Join-Path $stage "actions-runner"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Get-ChildItem -LiteralPath $runnerDiag -Filter "*.log" -File -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination $dest -Force
            }
          }

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-lsb-diagnostics
          path: |
            target/**/*.log
            crates/**/target/**/*.log
            target/windows-lsb-diagnostics/**
          if-no-files-found: ignore
