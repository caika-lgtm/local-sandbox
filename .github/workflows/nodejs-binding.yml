name: Node.js Binding

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/nodejs-binding.yml"
      - ".github/workflows/release_nodejs.yml"
      - "bindings/nodejs/**"
      - "crates/lsb-sdk/**"
      - "crates/lsb-vm/**"
      - "crates/lsb-proto/**"
      - "crates/lsb-proxy/**"
      - "crates/lsb-platform/**"
  pull_request:
    paths:
      - ".github/workflows/nodejs-binding.yml"
      - ".github/workflows/release_nodejs.yml"
      - "bindings/nodejs/**"
      - "crates/lsb-sdk/**"
      - "crates/lsb-vm/**"
      - "crates/lsb-proto/**"
      - "crates/lsb-proxy/**"
      - "crates/lsb-platform/**"

env:
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  COREPACK_INTEGRITY_KEYS: 0

jobs:
  lint:
    name: Lint and Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: bindings/nodejs/yarn.lock
      - run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - run: cmake --version
      - run: yarn install --immutable
      - run: yarn lint
      - run: cargo fmt --manifest-path Cargo.toml -- --check
      - run: cargo check --manifest-path Cargo.toml

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: bindings/nodejs/yarn.lock
      - run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cmake --version
      - run: yarn install --immutable
      - run: yarn napi build --target ${{ matrix.target }} --platform --release --js index.js --dts index.d.ts
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-nodejs-${{ matrix.target }}
          path: |
            bindings/nodejs/lsb-nodejs.*.node
            bindings/nodejs/index.js
            bindings/nodejs/index.d.ts
          if-no-files-found: error
