name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    name: Rust check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p shuru-platform -p shuru-vm -p shuru-sdk -p shuru-cli -p xtask
      - run: cargo check -p shuru-platform -p shuru-vm -p shuru-sdk -p shuru-cli -p xtask --target x86_64-apple-darwin
